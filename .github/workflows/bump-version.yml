name: Bump Version

on:
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.email "bump@deepvariant-arm64.gha"
          git config user.name "bump-my-version"
          BRANCH="bump-${{ github.run_number }}-main"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Bump version
        id: bump
        uses: callowayproject/bump-my-version@0.29.0
        with:
          args: arm64

      - name: Create PR
        if: steps.bump.outputs.bumped == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "bump: v${{ steps.bump.outputs.current-version }} [skip ci bump]" \
            --body "Automated version bump: ${{ steps.bump.outputs.previous-version }} → ${{ steps.bump.outputs.current-version }}"

      - name: Cleanup on failure
        if: failure() || cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin --delete "$BRANCH" 2>/dev/null || true
          gh pr close "$BRANCH" 2>/dev/null || true
