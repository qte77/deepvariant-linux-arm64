# CI workflow for building and testing DeepVariant on ARM64.
#
# Uses native ARM64 runners (no QEMU emulation needed).
# Runtime build uses a pre-built builder image from ghcr.io (~10min).
# Full from-source builder rebuild available via workflow_dispatch (~1-2hr native).
# Pushes images to ghcr.io tagged by version and SHA (latest on main).

name: ARM64 Build & Test

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      rebuild_builder:
        description: 'Rebuild base builder image from source (~1-2hr native ARM64)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      quantize_runner:
        description: >-
          ARM64 runner label for INT8 quantization. Default: ubuntu-24.04-arm (4 vCPU).
          Larger ARM64 runners (8-64 vCPU) require creating custom runners in repo settings.
        required: false
        default: 'ubuntu-24.04-arm'
        type: string

env:
  DOCKER_IMAGE: deepvariant-arm64
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Rebuild the base builder image from source (Bazel compilation).
  # Only runs on manual dispatch with rebuild_builder=true.
  # Reason: native ARM64 runner — no QEMU, ~1-2hr vs ~4hr+ emulated
  build-builder:
    name: Rebuild Base Builder Image
    if: github.event_name == 'workflow_dispatch' && inputs.rebuild_builder == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read project version
        id: version
        run: |
          version=$(grep '^current_version' .bumpversion.toml | sed 's/.*= *"//;s/"//')
          # Reason: upstream_version strips -arm64.N suffix for builder tag
          upstream_version=$(echo "$version" | sed 's/-.*//')
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "builder_tag=base-builder-v${upstream_version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base builder image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.arm64.builder
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.builder_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:builder-${{ steps.version.outputs.tag }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

  # Build the runtime image using the pre-built builder base (~10min native).
  # Reason: native ARM64 runner — no QEMU needed for apt-get, uv, tf2onnx
  # Waits for builder rebuild if triggered via dispatch with rebuild_builder=true
  build-arm64:
    name: Build ARM64 Docker Image
    needs: [build-builder]
    if: always() && (needs.build-builder.result == 'success' || needs.build-builder.result == 'skipped')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image-check.outputs.image_tag }}
      image_changed: ${{ steps.image-check.outputs.exists != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Read project version
        id: version
        run: |
          version=$(grep '^current_version' .bumpversion.toml | sed 's/.*= *"//;s/"//')
          upstream_version=$(echo "$version" | sed 's/-.*//')
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "builder_tag=base-builder-v${upstream_version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check base builder image exists
        run: |
          if ! docker manifest inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.builder_tag }}" > /dev/null 2>&1; then
            echo "::error::Base builder image ${{ steps.version.outputs.builder_tag }} not found. Run workflow_dispatch with rebuild_builder=true first."
            exit 1
          fi

      - name: Check if image already exists in GHCR
        id: image-check
        run: |
          # Check both SHA tag and version tag — PR events use a merge commit SHA
          # that differs from the branch HEAD SHA used by push/dispatch events.
          for tag in "${{ github.sha }}" "${{ steps.version.outputs.tag }}"; do
            if docker manifest inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}" > /dev/null 2>&1; then
              echo "exists=true" >> "$GITHUB_OUTPUT"
              echo "image_tag=${tag}" >> "$GITHUB_OUTPUT"
              echo "::notice::Image already exists in GHCR (tag: ${tag}), skipping build."
              exit 0
            fi
          done
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Docker meta (tags)
        if: steps.image-check.outputs.exists != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.tag }}
            type=sha,prefix=,format=long

      - name: Build and push ARM64 Docker image
        if: steps.image-check.outputs.exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.builder_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Branch: Security scanning
  # build-arm64 → security-scan
  # ---------------------------------------------------------------------------

  # Snyk container and IaC security scanning.
  # Steps are skipped when SNYK_TOKEN secret is not configured.
  # continue-on-error: true so findings don't block builds initially.
  # Reason: snyk/snyk:docker image is x86-only (no ARM64 manifest).
  security-scan:
    name: Snyk Container & IaC Scan
    needs: build-arm64
    if: always() && needs.build-arm64.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
      security-events: write
    env:
      HAS_SNYK_TOKEN: ${{ secrets.SNYK_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Snyk container scan
        if: env.HAS_SNYK_TOKEN == 'true'
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-arm64.outputs.image_tag }}
          args: --platform=linux/arm64 --severity-threshold=high --sarif-file-output=snyk-container.sarif
        continue-on-error: true

      - name: Snyk IaC scan (Dockerfiles)
        if: env.HAS_SNYK_TOKEN == 'true'
        uses: snyk/actions/iac@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-iac.sarif docker/
        continue-on-error: true

      - name: Upload container SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-container.sarif
        if: always() && hashFiles('snyk-container.sarif') != ''

      - name: Upload IaC SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-iac.sarif
          category: snyk-iac
        if: always() && hashFiles('snyk-iac.sarif') != ''

      - name: Snyk monitor (track in dashboard)
        if: env.HAS_SNYK_TOKEN == 'true' && github.ref == 'refs/heads/main'
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-arm64.outputs.image_tag }}
          args: --platform=linux/arm64
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Branch: FP32 accuracy validation
  # build-arm64 → test-accuracy-fp32
  # ---------------------------------------------------------------------------

  test-accuracy-fp32:
    name: Accuracy Validation FP32 (chr20)
    needs: build-arm64
    runs-on: ubuntu-24.04-arm
    if: >-
      always() && needs.build-arm64.result == 'success'
      && github.event_name != 'pull_request'
      && needs.build-arm64.outputs.image_changed == 'true'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Pull ARM64 Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-arm64.outputs.image_tag }}

      - name: Run HG003 chr20 benchmark
        run: |
          bash scripts/benchmark_arm64.sh \
            --accuracy \
            --docker-image "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-arm64.outputs.image_tag }}"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-fp32
          path: |
            ~/deepvariant-benchmark/output/benchmark_result.json
            ~/deepvariant-benchmark/output/happy_results/

  # ---------------------------------------------------------------------------
  # Branch: INT8 quantization + accuracy validation
  # build-arm64 → quantize-int8 → test-accuracy-int8
  # ---------------------------------------------------------------------------

  # INT8 static quantization using real calibration data (domain-specific pileup images).
  # Generates TFRecords via make_examples on a chr20 region, then runs
  # quantize_static_onnx.py with Percentile calibration (safe for InceptionV3).
  # Reason: dynamic INT8 doesn't work on ARM64 — ConvInteger(10) ops unsupported
  # by CPUExecutionProvider. Static INT8 with real data is the only viable path.
  #
  # Matrix runs WGS, WES, and PacBio in parallel with model-specific BAM data
  # and channel configurations. Each produces a separate GHCR artifact.
  #
  # Runner pricing (ARM64 Linux, as of 2026-01):
  #   ubuntu-24.04-arm (4 vCPU, 16GB) — free for public repos, $0.005/min private
  # Sources:
  #   https://docs.github.com/en/billing/reference/actions-runner-pricing
  #   https://docs.github.com/en/actions/reference/runners/github-hosted-runners
  quantize-int8:
    name: INT8 Static Quantization (${{ matrix.model_type }})
    needs: build-arm64
    runs-on: ${{ inputs.quantize_runner || 'ubuntu-24.04-arm' }}
    if: always() && needs.build-arm64.result == 'success'
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_type: wgs
            model_type_upper: WGS
            bam_url: "https://storage.googleapis.com/deepvariant/case-study-testdata/HG003.novaseq.pcr-free.35x.dedup.grch38_no_alt.chr20.bam"
            channel_list: "read_base,base_quality,mapping_quality,strand,read_supports_variant,base_differs_from_ref,insert_size"
            extra_make_examples_args: ""
          - model_type: wes
            model_type_upper: WES
            bam_url: "https://storage.googleapis.com/deepvariant/exome-case-study-testdata/HG003.novaseq.wes_idt.100x.dedup.bam"
            channel_list: "read_base,base_quality,mapping_quality,strand,read_supports_variant,base_differs_from_ref,insert_size"
            extra_make_examples_args: ""
          - model_type: pacbio
            model_type_upper: PACBIO
            bam_url: "https://storage.googleapis.com/deepvariant/pacbio-case-study-testdata/HG003.pfda_challenge.grch38.phased.chr20.bam"
            channel_list: "read_base,base_quality,mapping_quality,strand,read_supports_variant,base_differs_from_ref,haplotype"
            extra_make_examples_args: "--alt_aligned_pileup=diff_channels --min_mapping_quality=1 --parse_sam_aux_fields --partition_size=25000 --phase_reads --pileup_image_width=147 --sort_by_haplotypes --track_ref_reads --trim_reads_for_pileup --vsc_min_fraction_indels=0.12 --nosplit_skip_reads"
    env:
      DATA_DIR: /tmp/calibration-data
      OUTPUT_DIR: /tmp/int8-output
      IMAGE_TAG: ${{ needs.build-arm64.outputs.image_tag }}
      # Reason: 5MB region yields ~2300 examples — well above the 500 needed
      CALIBRATION_REGION: "chr20:10000000-15000000"
      NUM_SHARDS: "4"
      NUM_CALIBRATION_SAMPLES: "500"
    steps:
      - uses: actions/checkout@v4

      - name: Read project version
        id: version
        run: |
          version=$(grep '^current_version' .bumpversion.toml | sed 's/.*= *"//;s/"//')
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: oras-project/setup-oras@v1

      - name: Check if INT8 model already exists in GHCR
        id: int8-check
        run: |
          INT8_TAG="int8-${{ matrix.model_type }}-${{ steps.version.outputs.tag }}"
          if oras manifest fetch "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${INT8_TAG}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::INT8 ${{ matrix.model_type }} model already exists in GHCR (tag: ${INT8_TAG}), skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull runtime image
        if: steps.int8-check.outputs.exists != 'true'
        run: |
          docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

      - name: Download calibration data (reference + BAM)
        if: steps.int8-check.outputs.exists != 'true'
        run: |
          mkdir -p "${DATA_DIR}" "${OUTPUT_DIR}"
          NCBI_REF_DIR="https://ftp.ncbi.nlm.nih.gov/genomes/all/GCA/000/001/405/GCA_000001405.15_GRCh38/seqs_for_alignment_pipelines.ucsc_ids"
          REF="GRCh38_no_alt_analysis_set.fasta"

          echo "Downloading reference FASTA (~900MB compressed)..."
          curl -sS "${NCBI_REF_DIR}/GCA_000001405.15_GRCh38_no_alt_analysis_set.fna.gz" \
            | gunzip > "${DATA_DIR}/${REF}"
          curl -sS -o "${DATA_DIR}/${REF}.fai" \
            "${NCBI_REF_DIR}/GCA_000001405.15_GRCh38_no_alt_analysis_set.fna.fai"

          BAM_URL="${{ matrix.bam_url }}"
          BAM_FILE=$(basename "${BAM_URL}")
          echo "Downloading BAM: ${BAM_FILE}..."
          curl -sS -o "${DATA_DIR}/${BAM_FILE}" "${BAM_URL}"
          curl -sS -o "${DATA_DIR}/${BAM_FILE}.bai" "${BAM_URL}.bai"

      - name: Generate calibration TFRecords (make_examples)
        if: steps.int8-check.outputs.exists != 'true'
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          BAM_FILE=$(basename "${{ matrix.bam_url }}")
          echo "Running make_examples for ${{ matrix.model_type }} on ${CALIBRATION_REGION} (${NUM_SHARDS} shards)..."
          docker run --rm \
            -v "${DATA_DIR}:/data" \
            -v "${OUTPUT_DIR}:/output" \
            "${IMAGE}" \
            /opt/deepvariant/bin/make_examples \
              --mode=calling \
              --ref="/data/GRCh38_no_alt_analysis_set.fasta" \
              --reads="/data/${BAM_FILE}" \
              --regions="${CALIBRATION_REGION}" \
              --channel_list="${{ matrix.channel_list }}" \
              --examples="/output/calibration.tfrecord@${NUM_SHARDS}.gz" \
              ${{ matrix.extra_make_examples_args }}

          echo "Generated TFRecords:"
          ls -lh "${OUTPUT_DIR}"/calibration.tfrecord-*

      - name: Run static INT8 quantization (${{ matrix.model_type }}, Percentile)
        if: steps.int8-check.outputs.exists != 'true'
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "Quantizing ${{ matrix.model_type }} model (${NUM_CALIBRATION_SAMPLES} samples, Percentile)..."
          docker run --rm \
            -v "${OUTPUT_DIR}:/output" \
            "${IMAGE}" \
            python3 /opt/deepvariant/scripts/quantize_static_onnx.py \
              --input /opt/models/${{ matrix.model_type }}/model.onnx \
              --output /output/model_int8_static_${{ matrix.model_type }}.onnx \
              --tfrecord_dir /output \
              --saved_model_dir /opt/models/${{ matrix.model_type }} \
              --num_calibration_samples "${NUM_CALIBRATION_SAMPLES}" \
              --calibration_method percentile

          echo "INT8 model size:"
          ls -lh "${OUTPUT_DIR}"/model_int8_static_${{ matrix.model_type }}.onnx

      - name: Push INT8 model to GHCR
        if: steps.int8-check.outputs.exists != 'true'
        run: |
          INT8_TAG="int8-${{ matrix.model_type }}-${{ steps.version.outputs.tag }}"
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin
          oras push "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${INT8_TAG}" \
            "${OUTPUT_DIR}/model_int8_static_${{ matrix.model_type }}.onnx:application/vnd.onnx.model"
          echo "::notice::Pushed INT8 ${{ matrix.model_type }} model to GHCR (tag: ${INT8_TAG})"

      - name: Upload INT8 model artifact
        if: steps.int8-check.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: int8-model-${{ matrix.model_type }}-${{ steps.version.outputs.tag }}
          path: /tmp/int8-output/model_int8_static_${{ matrix.model_type }}.onnx

  # INT8 accuracy validation using the quantized ONNX models.
  # Volume-mounts each INT8 model over the FP32 model path inside the container
  # so run_deepvariant uses the INT8 model without any script changes.
  # Matrix runs WGS, WES, and PacBio in parallel with model-specific test data.
  test-accuracy-int8:
    name: Accuracy Validation INT8 ${{ matrix.model_type_upper }} (chr20)
    needs: [build-arm64, quantize-int8]
    runs-on: ubuntu-24.04-arm
    if: >-
      always() && needs.build-arm64.result == 'success'
      && needs.quantize-int8.result == 'success'
      && github.event_name != 'pull_request'
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_type: wgs
            model_type_upper: WGS
            bam_url: "https://storage.googleapis.com/deepvariant/case-study-testdata/HG003.novaseq.pcr-free.35x.dedup.grch38_no_alt.chr20.bam"
            regions: "chr20"
            extra_args: ""
          - model_type: wes
            model_type_upper: WES
            bam_url: "https://storage.googleapis.com/deepvariant/exome-case-study-testdata/HG003.novaseq.wes_idt.100x.dedup.bam"
            regions: "chr20"
            extra_args: ""
          - model_type: pacbio
            model_type_upper: PACBIO
            bam_url: "https://storage.googleapis.com/deepvariant/pacbio-case-study-testdata/HG003.pfda_challenge.grch38.phased.chr20.bam"
            regions: "chr20"
            extra_args: ""
    env:
      DATA_DIR: /tmp/benchmark-data
      OUTPUT_DIR: /tmp/benchmark-output
      INT8_MODEL_DIR: /tmp/int8-model
      IMAGE_TAG: ${{ needs.build-arm64.outputs.image_tag }}
      REF: GRCh38_no_alt_analysis_set.fasta
    steps:
      - uses: actions/checkout@v4

      - uses: oras-project/setup-oras@v1

      - name: Read project version
        id: version
        run: |
          version=$(grep '^current_version' .bumpversion.toml | sed 's/.*= *"//;s/"//')
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Check if INT8 model was built this run
        id: should-run
        run: |
          INT8_TAG="int8-${{ matrix.model_type }}-${{ steps.version.outputs.tag }}"
          # Reason: only run accuracy validation when the model was freshly quantized.
          # The quantize job outputs int8_changed per model type, but matrix outputs
          # can't be consumed per-leg. Instead, check the artifact directly.
          if oras manifest fetch "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${INT8_TAG}" > /dev/null 2>&1; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::INT8 ${{ matrix.model_type }} model not found in GHCR, skipping accuracy validation."
          fi

      - name: Log in to GitHub Container Registry
        if: steps.should-run.outputs.run == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull runtime image
        if: steps.should-run.outputs.run == 'true'
        run: |
          docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

      - name: Pull INT8 model from GHCR
        if: steps.should-run.outputs.run == 'true'
        run: |
          mkdir -p "${INT8_MODEL_DIR}"
          INT8_TAG="int8-${{ matrix.model_type }}-${{ steps.version.outputs.tag }}"
          cd "${INT8_MODEL_DIR}"
          oras pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${INT8_TAG}"
          echo "INT8 model:"
          ls -lh "${INT8_MODEL_DIR}/"

      - name: Download test data (reference + BAM)
        if: steps.should-run.outputs.run == 'true'
        run: |
          mkdir -p "${DATA_DIR}" "${OUTPUT_DIR}"
          NCBI_REF_DIR="https://ftp.ncbi.nlm.nih.gov/genomes/all/GCA/000/001/405/GCA_000001405.15_GRCh38/seqs_for_alignment_pipelines.ucsc_ids"

          echo "Downloading reference FASTA (~900MB compressed)..."
          curl -sS "${NCBI_REF_DIR}/GCA_000001405.15_GRCh38_no_alt_analysis_set.fna.gz" \
            | gunzip > "${DATA_DIR}/${REF}"
          curl -sS -o "${DATA_DIR}/${REF}.fai" \
            "${NCBI_REF_DIR}/GCA_000001405.15_GRCh38_no_alt_analysis_set.fna.fai"

          BAM_URL="${{ matrix.bam_url }}"
          BAM_FILE=$(basename "${BAM_URL}")
          echo "Downloading BAM: ${BAM_FILE}..."
          curl -sS -o "${DATA_DIR}/${BAM_FILE}" "${BAM_URL}"
          curl -sS -o "${DATA_DIR}/${BAM_FILE}.bai" "${BAM_URL}.bai"

      - name: Download GIAB truth set (VCF + BED)
        if: steps.should-run.outputs.run == 'true'
        run: |
          GIAB_DIR="https://ftp-trace.ncbi.nlm.nih.gov/giab/ftp/release/AshkenazimTrio/HG003_NA24149_father/NISTv4.2.1/GRCh38"
          TRUTH_VCF="HG003_GRCh38_1_22_v4.2.1_benchmark.vcf.gz"
          TRUTH_BED="HG003_GRCh38_1_22_v4.2.1_benchmark_noinconsistent.bed"
          for FILE in "${TRUTH_VCF}" "${TRUTH_VCF}.tbi" "${TRUTH_BED}"; do
            curl -sS -o "${DATA_DIR}/${FILE}" "${GIAB_DIR}/${FILE}"
          done

      - name: Run HG003 chr20 with INT8 ${{ matrix.model_type }} model
        if: steps.should-run.outputs.run == 'true'
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          INT8_ONNX="${INT8_MODEL_DIR}/model_int8_static_${{ matrix.model_type }}.onnx"
          BAM_FILE=$(basename "${{ matrix.bam_url }}")
          docker run --rm \
            -v "${DATA_DIR}:/data" \
            -v "${OUTPUT_DIR}:/output" \
            -v "${INT8_ONNX}:/opt/models/${{ matrix.model_type }}/model.onnx" \
            "${IMAGE}" \
            /opt/deepvariant/bin/run_deepvariant \
              --model_type=${{ matrix.model_type_upper }} \
              --ref="/data/${REF}" \
              --reads="/data/${BAM_FILE}" \
              --output_vcf=/output/HG003_arm64_int8_${{ matrix.model_type }}.vcf.gz \
              --output_gvcf=/output/HG003_arm64_int8_${{ matrix.model_type }}.g.vcf.gz \
              --num_shards="$(nproc)" \
              --regions=${{ matrix.regions }} \
              --intermediate_results_dir=/output/intermediate \
              --use_onnx \
              ${{ matrix.extra_args }}

      - name: Validate INT8 accuracy (hap.py)
        if: steps.should-run.outputs.run == 'true'
        run: |
          bash scripts/validate_accuracy.sh \
            --vcf "${OUTPUT_DIR}/HG003_arm64_int8_${{ matrix.model_type }}.vcf.gz" \
            --truth-vcf "${DATA_DIR}/HG003_GRCh38_1_22_v4.2.1_benchmark.vcf.gz" \
            --truth-bed "${DATA_DIR}/HG003_GRCh38_1_22_v4.2.1_benchmark_noinconsistent.bed" \
            --ref "${DATA_DIR}/${REF}" \
            --output-dir "${OUTPUT_DIR}/happy_results"

      - name: Upload benchmark results
        if: steps.should-run.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-int8-${{ matrix.model_type }}
          path: |
            /tmp/benchmark-output/HG003_arm64_int8_${{ matrix.model_type }}.vcf.gz
            /tmp/benchmark-output/HG003_arm64_int8_${{ matrix.model_type }}.g.vcf.gz
            /tmp/benchmark-output/happy_results/
