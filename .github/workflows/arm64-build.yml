# CI workflow for building and testing DeepVariant on ARM64.
#
# Uses native ARM64 runners (no QEMU emulation needed).
# Runtime build uses a pre-built builder image from ghcr.io (~10min).
# Full from-source builder rebuild available via workflow_dispatch (~1-2hr native).
# Pushes images to ghcr.io on both PRs (tagged pr-N) and main (tagged latest).

name: ARM64 Build & Test

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      rebuild_builder:
        description: 'Rebuild base builder image from source (~1-2hr native ARM64)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      quantize_runner:
        description: >-
          ARM64 runner for INT8 quantization. Default: ubuntu-24.04-arm (free, 4 vCPU).
          Larger runners require runner groups (Team/Enterprise plans).
          Pricing: https://docs.github.com/en/billing/reference/actions-runner-pricing
        required: false
        default: 'ubuntu-24.04-arm'
        type: choice
        options:
          - 'ubuntu-24.04-arm'
          - 'ubuntu-24.04-arm-2'
          - 'ubuntu-24.04-arm-4'
          - 'ubuntu-24.04-arm-8'
          - 'ubuntu-24.04-arm-16'
          - 'ubuntu-24.04-arm-32'
          - 'ubuntu-24.04-arm-64'

env:
  DOCKER_IMAGE: deepvariant-arm64
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Rebuild the base builder image from source (Bazel compilation).
  # Only runs on manual dispatch with rebuild_builder=true.
  # Reason: native ARM64 runner — no QEMU, ~1-2hr vs ~4hr+ emulated
  build-builder:
    name: Rebuild Base Builder Image
    if: github.event_name == 'workflow_dispatch' && inputs.rebuild_builder == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read project version
        id: version
        run: |
          version=$(grep '^current_version' .bumpversion.toml | sed 's/.*= *"//;s/"//')
          # Reason: upstream_version strips -arm64.N suffix for builder tag
          upstream_version=$(echo "$version" | sed 's/-.*//')
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "builder_tag=base-builder-v${upstream_version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base builder image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.arm64.builder
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.builder_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:builder-${{ steps.version.outputs.tag }}
          cache-from: type=gha,scope=builder
          cache-to: type=gha,mode=max,scope=builder

  # Build the runtime image using the pre-built builder base (~10min native).
  # Reason: native ARM64 runner — no QEMU needed for apt-get, uv, tf2onnx
  # Waits for builder rebuild if triggered via dispatch with rebuild_builder=true
  build-arm64:
    name: Build ARM64 Docker Image
    needs: [build-builder]
    if: always() && (needs.build-builder.result == 'success' || needs.build-builder.result == 'skipped')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Read project version
        id: version
        run: |
          version=$(grep '^current_version' .bumpversion.toml | sed 's/.*= *"//;s/"//')
          upstream_version=$(echo "$version" | sed 's/-.*//')
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          echo "builder_tag=base-builder-v${upstream_version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check base builder image exists
        run: |
          if ! docker manifest inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.builder_tag }}" > /dev/null 2>&1; then
            echo "::error::Base builder image ${{ steps.version.outputs.builder_tag }} not found. Run workflow_dispatch with rebuild_builder=true first."
            exit 1
          fi

      - name: Docker meta (tags for main and PR branches)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.tag }}
            type=sha,prefix=,format=long
            type=ref,event=pr

      - name: Build and push ARM64 Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.builder_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # INT8 static quantization using real calibration data (WGS pileup images).
  # Generates TFRecords via make_examples on a small chr20 region, then runs
  # quantize_static_onnx.py with Percentile calibration (safe for InceptionV3).
  # Reason: dynamic INT8 doesn't work on ARM64 — ConvInteger(10) ops unsupported
  # by CPUExecutionProvider. Static INT8 with real data is the only viable path.
  #
  # Runner pricing (ARM64 Linux, as of 2026-01):
  #   ubuntu-24.04-arm (4 vCPU, 16GB) — free for public repos, $0.005/min private
  #   Larger runners require runner groups (Team/Enterprise plans):
  #     4-core $0.008/min, 8-core $0.014/min, 16-core $0.026/min,
  #     32-core $0.050/min, 64-core $0.098/min
  # Sources:
  #   https://docs.github.com/en/billing/reference/actions-runner-pricing
  #   https://docs.github.com/en/actions/reference/runners/github-hosted-runners
  #   https://github.com/orgs/community/discussions/148648
  quantize-int8:
    name: INT8 Static Quantization (WGS)
    needs: build-arm64
    runs-on: ${{ inputs.quantize_runner || 'ubuntu-24.04-arm' }}
    if: always() && needs.build-arm64.result == 'success'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      DATA_DIR: /tmp/calibration-data
      OUTPUT_DIR: /tmp/int8-output
      IMAGE_TAG: ${{ github.sha }}
      # Reason: 5MB region yields ~2300 examples — well above the 500 needed
      CALIBRATION_REGION: "chr20:10000000-15000000"
      NUM_SHARDS: "4"
      NUM_CALIBRATION_SAMPLES: "500"
    steps:
      - uses: actions/checkout@v4

      - name: Read project version
        id: version
        run: |
          version=$(grep '^current_version' .bumpversion.toml | sed 's/.*= *"//;s/"//')
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull runtime image
        run: |
          docker pull "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

      - name: Download calibration data (reference + BAM)
        run: |
          mkdir -p "${DATA_DIR}" "${OUTPUT_DIR}"
          NCBI_REF_DIR="https://ftp.ncbi.nlm.nih.gov/genomes/all/GCA/000/001/405/GCA_000001405.15_GRCh38/seqs_for_alignment_pipelines.ucsc_ids"
          GCS_DIR="https://storage.googleapis.com/deepvariant/case-study-testdata"
          REF="GRCh38_no_alt_analysis_set.fasta"
          BAM="HG003.novaseq.pcr-free.35x.dedup.grch38_no_alt.chr20.bam"

          echo "Downloading reference FASTA (~900MB compressed)..."
          curl -sS "${NCBI_REF_DIR}/GCA_000001405.15_GRCh38_no_alt_analysis_set.fna.gz" \
            | gunzip > "${DATA_DIR}/${REF}"
          curl -sS -o "${DATA_DIR}/${REF}.fai" \
            "${NCBI_REF_DIR}/GCA_000001405.15_GRCh38_no_alt_analysis_set.fna.fai"

          echo "Downloading BAM + index..."
          curl -sS -o "${DATA_DIR}/${BAM}" "${GCS_DIR}/${BAM}"
          curl -sS -o "${DATA_DIR}/${BAM}.bai" "${GCS_DIR}/${BAM}.bai"

      - name: Generate calibration TFRecords (make_examples)
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "Running make_examples on ${CALIBRATION_REGION} (${NUM_SHARDS} shards)..."
          docker run --rm \
            -v "${DATA_DIR}:/data" \
            -v "${OUTPUT_DIR}:/output" \
            "${IMAGE}" \
            /opt/deepvariant/bin/make_examples \
              --mode=calling \
              --ref="/data/GRCh38_no_alt_analysis_set.fasta" \
              --reads="/data/HG003.novaseq.pcr-free.35x.dedup.grch38_no_alt.chr20.bam" \
              --regions="${CALIBRATION_REGION}" \
              --channel_list="read_base,base_quality,mapping_quality,strand,read_supports_variant,base_differs_from_ref,insert_size" \
              --examples="/output/calibration.tfrecord@${NUM_SHARDS}.gz"

          echo "Generated TFRecords:"
          ls -lh "${OUTPUT_DIR}"/calibration.tfrecord-*

      - name: Run static INT8 quantization (WGS, Percentile)
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          echo "Quantizing WGS model (${NUM_CALIBRATION_SAMPLES} samples, Percentile)..."
          docker run --rm \
            -v "${OUTPUT_DIR}:/output" \
            "${IMAGE}" \
            python3 /opt/deepvariant/scripts/quantize_static_onnx.py \
              --input /opt/models/wgs/model.onnx \
              --output /output/model_int8_static_wgs.onnx \
              --tfrecord_dir /output \
              --saved_model_dir /opt/models/wgs \
              --num_calibration_samples "${NUM_CALIBRATION_SAMPLES}" \
              --calibration_method percentile

          echo "INT8 model size:"
          ls -lh "${OUTPUT_DIR}"/model_int8_static_wgs.onnx

          # TODO: WES and PacBio calibration — WGS TFRecords may not be
          # representative for WES/PacBio activation distributions. Needs
          # model-specific BAM data or cross-domain accuracy validation.
          # For now, only WGS is quantized in CI.

      - name: Upload INT8 model artifact
        uses: actions/upload-artifact@v4
        with:
          name: int8-models-${{ steps.version.outputs.tag }}
          path: /tmp/int8-output/model_int8_static_wgs.onnx

  # Snyk container and IaC security scanning.
  # Steps are skipped when SNYK_TOKEN secret is not configured.
  # continue-on-error: true so findings don't block builds initially.
  # Reason: snyk/snyk:docker image is x86-only (no ARM64 manifest).
  security-scan:
    name: Snyk Container & IaC Scan
    needs: build-arm64
    if: always() && needs.build-arm64.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
      security-events: write
    env:
      HAS_SNYK_TOKEN: ${{ secrets.SNYK_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Snyk container scan
        if: env.HAS_SNYK_TOKEN == 'true'
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          args: --platform=linux/arm64 --severity-threshold=high --sarif-file-output=snyk-container.sarif
        continue-on-error: true

      - name: Snyk IaC scan (Dockerfiles)
        if: env.HAS_SNYK_TOKEN == 'true'
        uses: snyk/actions/iac@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-iac.sarif docker/
        continue-on-error: true

      - name: Upload container SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-container.sarif
        if: always() && hashFiles('snyk-container.sarif') != ''

      - name: Upload IaC SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-iac.sarif
          category: snyk-iac
        if: always() && hashFiles('snyk-iac.sarif') != ''

      - name: Snyk monitor (track in dashboard)
        if: env.HAS_SNYK_TOKEN == 'true' && github.ref == 'refs/heads/main'
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: monitor
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          args: --platform=linux/arm64
        continue-on-error: true

  test-accuracy:
    name: Accuracy Validation (chr20)
    needs: build-arm64
    runs-on: ubuntu-24.04-arm
    if: github.event_name != 'pull_request'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Pull ARM64 Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run HG003 chr20 benchmark
        run: |
          bash scripts/benchmark_arm64.sh \
            --accuracy \
            --docker-image "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            ~/deepvariant-benchmark/output/benchmark_result.json
            ~/deepvariant-benchmark/output/happy_results/
